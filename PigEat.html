<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小胖猪吃美食</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 16px;
            color: #555;
        }
        
        .info-item {
            padding: 8px 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        #gameCanvas {
            border: 4px solid #333;
            border-radius: 10px;
            background: #fff;
            display: block;
            margin: 0 auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .controls {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }
        
        .food-legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }
        
        .food-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            padding: 5px 10px;
            background: #f9f9f9;
            border-radius: 15px;
        }
        
        .food-emoji {
            font-size: 20px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .modal h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal p {
            font-size: 18px;
            color: #666;
            margin-bottom: 25px;
        }
        
        .modal button {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .modal button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .win { color: #4CAF50; }
        .lose { color: #f44336; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐷 小胖猪吃美食 🐷</h1>
        
        <div class="game-info">
            <div class="info-item">等级: <span id="level">小猪猪</span></div>
            <div class="info-item">时间: <span id="timer">60</span>秒</div>
            <div class="info-item">食物: <span id="foodCount">0</span>/16</div>
        </div>
        
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        
        <div class="controls">
            使用 ↑ ↓ ← → 或 WASD 控制小猪移动
        </div>
        
        <div class="food-legend">
            <div class="food-item"><span class="food-emoji">🍎</span>苹果</div>
            <div class="food-item"><span class="food-emoji">🍌</span>香蕉</div>
            <div class="food-item"><span class="food-emoji">🍊</span>橙子</div>
            <div class="food-item"><span class="food-emoji">🍇</span>葡萄</div>
            <div class="food-item"><span class="food-emoji">🍓</span>草莓</div>
            <div class="food-item"><span class="food-emoji">🫐</span>蓝莓</div>
            <div class="food-item"><span class="food-emoji">🍒</span>樱桃</div>
            <div class="food-item"><span class="food-emoji">🍉</span>西瓜</div>
            <div class="food-item"><span class="food-emoji">🥝</span>猕猴桃</div>
            <div class="food-item"><span class="food-emoji">🍑</span>桃子</div>
            <div class="food-item"><span class="food-emoji">🍍</span>菠萝</div>
            <div class="food-item"><span class="food-emoji">🥭</span>芒果</div>
            <div class="food-item"><span class="food-emoji">🍋</span>柠檬</div>
            <div class="food-item"><span class="food-emoji">🍐</span>梨</div>
            <div class="food-item"><span class="food-emoji">🍈</span>哈密瓜</div>
            <div class="food-item"><span class="food-emoji">🥥</span>椰子</div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <p id="modalMessage"></p>
            <button onclick="restartGame()">重新开始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const CELL_SIZE = 30;
        const MAZE_WIDTH = 20;
        const MAZE_HEIGHT = 20;
        
        let pig = { x: 1, y: 1, level: 1 };
        let wolf = { x: 18, y: 18, speed: 1 };
        let foods = [];
        let maze = [];
        let gameTime = 60;
        let gameInterval;
        let timerInterval;
        let wolfInterval;
        let gameActive = true;
        
        const foodEmojis = ['🍎', '🍌', '🍊', '🍇', '🍓', '🫐', '🍒', '🍉', '🥝', '🍑', '🍍', '🥭', '🍋', '🍐', '🍈', '🥥'];
        const foodNames = ['苹果', '香蕉', '橙子', '葡萄', '草莓', '蓝莓', '樱桃', '西瓜', '猕猴桃', '桃子', '菠萝', '芒果', '柠檬', '梨', '哈密瓜', '椰子'];
        
        const levelNames = [
            '小猪猪', '胖猪猪', '大猪猪', '超级猪猪', '究极猪猪', 
            '传说猪猪', '神话猪猪', '至尊猪猪', '猪猪之王', '猪猪之神',
            '宇宙猪猪', '银河猪猪', '时空猪猪', '混沌猪猪', '创世猪猪', '永恒猪猪'
        ];
        
        let audioContext;
        
        function initAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            } catch (e) {
                console.log('Audio not supported');
            }
        }
        
        function playSound(type) {
            if (!audioContext) return;
            
            switch(type) {
                case 'walk':
                    const walkOsc = audioContext.createOscillator();
                    const walkGain = audioContext.createGain();
                    walkOsc.connect(walkGain);
                    walkGain.connect(audioContext.destination);
                    
                    walkOsc.type = 'triangle';
                    walkOsc.frequency.setValueAtTime(150, audioContext.currentTime);
                    walkOsc.frequency.exponentialRampToValueAtTime(80, audioContext.currentTime + 0.08);
                    
                    walkGain.gain.setValueAtTime(0.15, audioContext.currentTime);
                    walkGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
                    
                    walkOsc.start(audioContext.currentTime);
                    walkOsc.stop(audioContext.currentTime + 0.08);
                    break;
                    
                case 'eat':
                    const eatOsc = audioContext.createOscillator();
                    const eatGain = audioContext.createGain();
                    eatOsc.connect(eatGain);
                    eatGain.connect(audioContext.destination);
                    
                    eatOsc.frequency.setValueAtTime(523.25, audioContext.currentTime);
                    eatOsc.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
                    eatOsc.frequency.setValueAtTime(783.99, audioContext.currentTime + 0.2);
                    eatGain.gain.setValueAtTime(0.3, audioContext.currentTime);
                    eatGain.gain.exponentialDecayTo = 0.01;
                    eatOsc.start(audioContext.currentTime);
                    eatOsc.stop(audioContext.currentTime + 0.3);
                    break;
                    
                case 'caught':
                    const caughtOsc = audioContext.createOscillator();
                    const caughtGain = audioContext.createGain();
                    caughtOsc.connect(caughtGain);
                    caughtGain.connect(audioContext.destination);
                    
                    caughtOsc.frequency.setValueAtTime(200, audioContext.currentTime);
                    caughtOsc.frequency.setValueAtTime(150, audioContext.currentTime + 0.1);
                    caughtOsc.frequency.setValueAtTime(100, audioContext.currentTime + 0.2);
                    caughtGain.gain.setValueAtTime(0.4, audioContext.currentTime);
                    caughtOsc.start(audioContext.currentTime);
                    caughtOsc.stop(audioContext.currentTime + 0.4);
                    break;
                    
                case 'win':
                    const notes = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
                    notes.forEach((freq, i) => {
                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();
                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.setValueAtTime(freq, audioContext.currentTime + i * 0.1);
                        gain.gain.setValueAtTime(0.3, audioContext.currentTime + i * 0.1);
                        gain.gain.exponentialDecayTo = 0.01;
                        osc.start(audioContext.currentTime + i * 0.1);
                        osc.stop(audioContext.currentTime + i * 0.1 + 0.15);
                    });
                    return;
            }
        }
        
        function generateMaze() {
            maze = [];
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                maze[y] = [];
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (x === 0 || x === MAZE_WIDTH - 1 || y === 0 || y === MAZE_HEIGHT - 1) {
                        maze[y][x] = 1;
                    } else if (x % 2 === 0 && y % 2 === 0) {
                        maze[y][x] = Math.random() < 0.4 ? 1 : 0;
                    } else if (Math.random() < 0.12) {
                        maze[y][x] = 1;
                    } else {
                        maze[y][x] = 0;
                    }
                }
            }
            
            maze[1][1] = 0;
            maze[1][2] = 0;
            maze[2][1] = 0;
            maze[2][2] = 0;
            
            maze[18][18] = 0;
            maze[17][18] = 0;
            maze[18][17] = 0;
            maze[17][17] = 0;
            
            for (let y = 1; y < MAZE_HEIGHT - 1; y++) {
                for (let x = 1; x < MAZE_WIDTH - 1; x++) {
                    if (maze[y][x] === 1) {
                        let neighbors = 0;
                        if (maze[y-1][x] === 1) neighbors++;
                        if (maze[y+1][x] === 1) neighbors++;
                        if (maze[y][x-1] === 1) neighbors++;
                        if (maze[y][x+1] === 1) neighbors++;
                        
                        if (neighbors >= 3) {
                            maze[y][x] = 0;
                        }
                    }
                }
            }
            
            ensurePathToPig();
            ensurePathToWolf();
        }
        
        function ensurePathToPig() {
            const directions = [
                { dx: 0, dy: -1 },
                { dx: 0, dy: 1 },
                { dx: -1, dy: 0 },
                { dx: 1, dy: 0 }
            ];
            
            for (let radius = 1; radius <= 5; radius++) {
                for (const dir of directions) {
                    const newX = 1 + dir.dx * radius;
                    const newY = 1 + dir.dy * radius;
                    
                    if (newX > 0 && newX < MAZE_WIDTH - 1 && newY > 0 && newY < MAZE_HEIGHT - 1) {
                        maze[newY][newX] = 0;
                    }
                }
            }
        }
        
        function ensurePathToWolf() {
            const directions = [
                { dx: 0, dy: -1 },
                { dx: 0, dy: 1 },
                { dx: -1, dy: 0 },
                { dx: 1, dy: 0 }
            ];
            
            for (let radius = 1; radius <= 5; radius++) {
                for (const dir of directions) {
                    const newX = 18 + dir.dx * radius;
                    const newY = 18 + dir.dy * radius;
                    
                    if (newX > 0 && newX < MAZE_WIDTH - 1 && newY > 0 && newY < MAZE_HEIGHT - 1) {
                        maze[newY][newX] = 0;
                    }
                }
            }
        }
        
        function generateFoods() {
            foods = [];
            let placed = 0;
            while (placed < 16) {
                let x = Math.floor(Math.random() * (MAZE_WIDTH - 2)) + 1;
                let y = Math.floor(Math.random() * (MAZE_HEIGHT - 2)) + 1;
                
                if (maze[y][x] === 0 && !(x === 1 && y === 1) && !(x === 18 && y === 18)) {
                    let exists = foods.some(f => f.x === x && f.y === y);
                    if (!exists) {
                        foods.push({ x, y, emoji: foodEmojis[placed], name: foodNames[placed], collected: false });
                        placed++;
                    }
                }
            }
        }
        
        function drawMaze() {
            for (let y = 0; y < MAZE_HEIGHT; y++) {
                for (let x = 0; x < MAZE_WIDTH; x++) {
                    if (maze[y][x] === 1) {
                        const gradient = ctx.createLinearGradient(
                            x * CELL_SIZE, y * CELL_SIZE,
                            (x + 1) * CELL_SIZE, (y + 1) * CELL_SIZE
                        );
                        gradient.addColorStop(0, '#4a5568');
                        gradient.addColorStop(1, '#2d3748');
                        ctx.fillStyle = gradient;
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        
                        ctx.strokeStyle = '#1a202c';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        
                        ctx.fillStyle = '#718096';
                        ctx.fillRect(x * CELL_SIZE + 5, y * CELL_SIZE + 5, CELL_SIZE - 10, CELL_SIZE - 10);
                    } else {
                        ctx.fillStyle = '#f7fafc';
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        
                        ctx.strokeStyle = '#e2e8f0';
                        ctx.lineWidth = 0.5;
                        ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                    }
                }
            }
        }
        
        function drawFoods() {
            foods.forEach(food => {
                if (!food.collected) {
                    ctx.font = `${CELL_SIZE - 8}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    const x = food.x * CELL_SIZE + CELL_SIZE/2;
                    const y = food.y * CELL_SIZE + CELL_SIZE/2;
                    
                    ctx.save();
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 5;
                    ctx.shadowOffsetX = 2;
                    ctx.shadowOffsetY = 2;
                    ctx.fillText(food.emoji, x, y);
                    ctx.restore();
                }
            });
        }
        
        function drawPig() {
            const x = pig.x * CELL_SIZE + CELL_SIZE/2;
            const y = pig.y * CELL_SIZE + CELL_SIZE/2;
            const size = CELL_SIZE/2 - 2;
            
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 3;
            ctx.shadowOffsetY = 3;
            
            const gradient = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, size);
            gradient.addColorStop(0, '#FFD1DC');
            gradient.addColorStop(1, '#FFB6C1');
            
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#FF69B4';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
            
            ctx.beginPath();
            ctx.arc(x - size/3, y - size/4, size/4, 0, Math.PI * 2);
            ctx.arc(x + size/3, y - size/4, size/4, 0, Math.PI * 2);
            ctx.fillStyle = '#333';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x - size/3 - 2, y - size/4 - 2, size/8, 0, Math.PI * 2);
            ctx.arc(x + size/3 - 2, y - size/4 - 2, size/8, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(x, y + size/4, size/2.5, size/3, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#FF69B4';
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(x - size/4, y + size/4, size/6, size/4, -0.2, 0, Math.PI * 2);
            ctx.ellipse(x + size/4, y + size/4, size/6, size/4, 0.2, 0, Math.PI * 2);
            ctx.fillStyle = '#FF1493';
            ctx.fill();
            
            const levelIndex = Math.min(pig.level - 1, levelNames.length - 1);
            ctx.font = 'bold 10px Arial';
            ctx.fillStyle = '#333';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(levelNames[levelIndex], x, y - size - 8);
        }
        
        function drawWolf() {
            const x = wolf.x * CELL_SIZE + CELL_SIZE/2;
            const y = wolf.y * CELL_SIZE + CELL_SIZE/2;
            const size = CELL_SIZE/2 - 2;
            
            ctx.save();
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 4;
            ctx.shadowOffsetY = 4;
            
            const gradient = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, size);
            gradient.addColorStop(0, '#6B7280');
            gradient.addColorStop(1, '#4B5563');
            
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
            
            ctx.beginPath();
            ctx.moveTo(x - size, y - size/2);
            ctx.lineTo(x - size/2, y - size);
            ctx.lineTo(x, y - size/2);
            ctx.lineTo(x + size/2, y - size);
            ctx.lineTo(x + size, y - size/2);
            ctx.closePath();
            ctx.fillStyle = '#4B5563';
            ctx.fill();
            ctx.strokeStyle = '#374151';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(x - size/3, y - size/4, size/5, 0, Math.PI * 2);
            ctx.arc(x + size/3, y - size/4, size/5, 0, Math.PI * 2);
            ctx.fillStyle = '#EF4444';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x - size/3, y - size/4, size/8, 0, Math.PI * 2);
            ctx.arc(x + size/3, y - size/4, size/8, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x, y + size/3, size/4, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(x - size/2, y + size/2);
            ctx.lineTo(x - size/3, y + size/2 + 5);
            ctx.lineTo(x - size/6, y + size/2);
            ctx.moveTo(x + size/6, y + size/2);
            ctx.lineTo(x + size/3, y + size/2 + 5);
            ctx.lineTo(x + size/2, y + size/2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function findPathToPig() {
            const start = { x: wolf.x, y: wolf.y };
            const end = { x: pig.x, y: pig.y };
            
            const queue = [{ x: start.x, y: start.y, path: [] }];
            const visited = new Set();
            visited.add(`${start.x},${start.y}`);
            
            const directions = [
                { dx: 0, dy: -1 },
                { dx: 0, dy: 1 },
                { dx: -1, dy: 0 },
                { dx: 1, dy: 0 }
            ];
            
            while (queue.length > 0) {
                const current = queue.shift();
                
                if (current.x === end.x && current.y === end.y) {
                    return current.path;
                }
                
                for (const dir of directions) {
                    const newX = current.x + dir.dx;
                    const newY = current.y + dir.dy;
                    const key = `${newX},${newY}`;
                    
                    if (newX >= 0 && newX < MAZE_WIDTH && 
                        newY >= 0 && newY < MAZE_HEIGHT && 
                        maze[newY][newX] === 0 && 
                        !visited.has(key)) {
                        
                        visited.add(key);
                        queue.push({
                            x: newX,
                            y: newY,
                            path: [...current.path, { x: newX, y: newY }]
                        });
                    }
                }
            }
            
            return null;
        }
        
        function moveWolf() {
            if (!gameActive) return;
            
            const path = findPathToPig();
            
            if (path && path.length > 0) {
                wolf.x = path[0].x;
                wolf.y = path[0].y;
            } else {
                let dx = pig.x - wolf.x;
                let dy = pig.y - wolf.y;
                
                let newX = wolf.x;
                let newY = wolf.y;
                
                if (Math.abs(dx) > Math.abs(dy)) {
                    newX += dx > 0 ? 1 : -1;
                } else {
                    newY += dy > 0 ? 1 : -1;
                }
                
                if (newX >= 0 && newX < MAZE_WIDTH && newY >= 0 && newY < MAZE_HEIGHT && maze[newY][newX] === 0) {
                    wolf.x = newX;
                    wolf.y = newY;
                }
            }
            
            checkWolfCollision();
        }
        
        function checkWolfCollision() {
            if (pig.x === wolf.x && pig.y === wolf.y) {
                endGame(false);
            }
        }
        
        function checkFoodCollision() {
            foods.forEach(food => {
                if (!food.collected && food.x === pig.x && food.y === pig.y) {
                    food.collected = true;
                    pig.level++;
                    playSound('eat');
                    updateUI();
                    
                    if (foods.every(f => f.collected)) {
                        endGame(true);
                    }
                }
            });
        }
        
        function updateUI() {
            const levelIndex = Math.min(pig.level - 1, levelNames.length - 1);
            document.getElementById('level').textContent = levelNames[levelIndex];
            document.getElementById('foodCount').textContent = foods.filter(f => f.collected).length;
            document.getElementById('timer').textContent = gameTime;
        }
        
        function endGame(won) {
            gameActive = false;
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            clearInterval(wolfInterval);
            
            if (won) {
                playSound('win');
            } else {
                playSound('caught');
            }
            
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const message = document.getElementById('modalMessage');
            
            if (won) {
                title.textContent = '🎉 恭喜通关！';
                title.className = 'win';
                message.textContent = '恭喜你站在猪猪之巅——张焕焕';
            } else {
                title.textContent = '💔 游戏结束';
                title.className = 'lose';
                message.textContent = '你被狼浩浩捕捉';
            }
            
            modal.style.display = 'flex';
        }
        
        function restartGame() {
            document.getElementById('modal').style.display = 'none';
            initGame();
        }
        
        function initGame() {
            pig = { x: 1, y: 1, level: 1 };
            wolf = { x: 18, y: 18, speed: 1 };
            gameTime = 60;
            gameActive = true;
            
            if (!audioContext) {
                initAudio();
            }
            
            generateMaze();
            generateFoods();
            updateUI();
            
            clearInterval(gameInterval);
            clearInterval(timerInterval);
            clearInterval(wolfInterval);
            
            gameInterval = setInterval(gameLoop, 100);
            timerInterval = setInterval(() => {
                if (gameActive) {
                    gameTime--;
                    updateUI();
                    if (gameTime <= 0) {
                        endGame(false);
                    }
                }
            }, 1000);
            wolfInterval = setInterval(moveWolf, 300);
        }
        
        function gameLoop() {
            if (!gameActive) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMaze();
            drawFoods();
            drawPig();
            drawWolf();
        }
        
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            
            let newX = pig.x;
            let newY = pig.y;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    newY--;
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    newY++;
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    newX--;
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    newX++;
                    break;
                default:
                    return;
            }
            
            if (newX >= 0 && newX < MAZE_WIDTH && newY >= 0 && newY < MAZE_HEIGHT && maze[newY][newX] === 0) {
                pig.x = newX;
                pig.y = newY;
                playSound('walk');
                checkFoodCollision();
                checkWolfCollision();
            }
            
            e.preventDefault();
        });
        
        document.addEventListener('click', () => {
            if (!audioContext) {
                initAudio();
            }
        }, { once: true });
        
        initGame();
    </script>
</body>
</html>
